name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -q

  typecheck:
    name: pyright (advisory)
    runs-on: ubuntu-latest
    # Advisory only: the helpers are heavy pandas/numpy/scipy code, whose typing
    # stubs return broad union types — pyright flags those interactions in the
    # hundreds even though the runtime suite is green. This job surfaces type
    # findings without gating merges; do not make it required until the stub
    # noise is addressed (e.g. targeted casts or per-rule downgrades).
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements-dev.txt

      - name: Run pyright (advisory)
        run: pyright
